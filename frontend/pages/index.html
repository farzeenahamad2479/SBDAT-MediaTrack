<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaTrack — Every Story Leaves a Mark.</title>

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<section class="hero" id="hero">

  <div class="hero-bg" id="heroBg">
    <img src="../assets/hero-bg.jpg" alt="" data-fallback="#heroBg">
  </div>

  <div class="hero-overlay"></div>

  <div class="hero-content">

    <div class="logo-mark">
      <img src="../assets/logo.png" alt="MediaTrack" data-fallback="#heroLogoFallback">
      <div class="logo-fallback" id="heroLogoFallback" aria-hidden="true"></div>
    </div>

    <h1 class="hero-title">MediaTrack</h1>

    <div class="title-rule"></div>

    <p class="hero-tagline">Every Story Leaves a Mark.</p>

    <p class="hero-desc">
      Track every movie, every episode, every unforgettable journey.
    </p>

    <button type="button" class="btn-ghost" data-begin-journey>
      Begin Your Journey
    </button>

  </div>

</section>

<section class="auth-stage is-embedded" id="authStage">

  <div class="auth-backdrop" id="authBackdrop">
    <img src="../assets/hero-bg.jpg" alt="" data-fallback="#authBackdrop">
  </div>

  <div class="auth-card">

    <div class="auth-brand">

      <div class="logo-mark auth-logo">
        <img src="../assets/logo.png" alt="MediaTrack" data-fallback="#authLogoFallback">
        <div class="logo-fallback" id="authLogoFallback"></div>
      </div>

      <h2 class="auth-name">MediaTrack</h2>

      <p class="auth-title">
        Sign In To Continue
      </p>

      <p class="auth-hint">
        Demo access —
        <strong>Email:</strong> demo@mediatrack.com
        or
        <strong>Username:</strong> demo
        ·
        <strong>Password:</strong> 1234
      </p>

    </div>

    <form data-auth-form="login" novalidate>

      <div class="field">

        <label for="loginIdentifier">
          Email or Username
        </label>

        <input
          id="loginIdentifier"
          type="text"
          name="identifier"
          placeholder="Enter your email or username"
          autocomplete="username"
          required
        >

        <p class="field-error" data-for="identifier"></p>

      </div>

      <div class="field">

        <label for="loginPassword">
          Password
        </label>

        <input
          id="loginPassword"
          type="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >

        <button
          type="button"
          class="field-toggle"
          aria-label="Show password"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>

        <p class="field-error" data-for="password"></p>

      </div>

      <div class="row-between">

        <label class="remember">
          <input type="checkbox" name="remember">
          Remember me
        </label>

        <a href="#" class="link-quiet">
          Forgot password?
        </a>

      </div>

      <button type="submit" class="btn-primary">
        Sign In
      </button>

    </form>

    <p class="auth-footer">
      New to MediaTrack?
      <a href="signup.html">Create Account</a>
    </p>

  </div>

</section>

<script src="../js/script.js"></script>

</body>
</html>
