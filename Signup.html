<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up · MediaTrack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scene" aria-hidden="true">
    <div class="slab slab-1"></div>
    <div class="slab slab-2"></div>
    <div class="slab slab-3"></div>
    <div class="slab slab-4"></div>
  </div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <main class="stage">
    <div class="card">
      <div class="perf" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 52 52" fill="none">
            <circle cx="26" cy="26" r="21" stroke="#3a2b2c" stroke-width="2.5"/>
            <circle class="ring-progress" cx="26" cy="26" r="21" stroke="#ff3b4a" stroke-width="2.5"
                    stroke-linecap="round" transform="rotate(-90 26 26)"/>
            <path d="M21 18L34 26L21 34V18Z" fill="#f3efe9"/>
          </svg>
        </div>
        <h1 class="brand-name">MEDIA<em>TRACK</em></h1>
        <p class="tagline">Track every story. Remember every journey.</p>
      </div>

      <p class="form-title">Create your account</p>

      <form data-auth-form="signup" novalidate>
        <div>
          <div class="field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="8" r="3.5"/>
              <path d="M4.5 20c1.2-3.8 4.3-6 7.5-6s6.3 2.2 7.5 6"/>
            </svg>
            <input type="text" name="username" placeholder="Username" autocomplete="username" required>
          </div>
          <p class="field-error" data-for="username"></p>
        </div>

        <div>
          <div class="field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M3 6.5C3 5.67 3.67 5 4.5 5h15c.83 0 1.5.67 1.5 1.5v11c0 .83-.67 1.5-1.5 1.5h-15A1.5 1.5 0 0 1 3 17.5v-11Z"/>
              <path d="m4 6.5 8 6 8-6"/>
            </svg>
            <input type="email" name="email" placeholder="Email address" autocomplete="email" required>
          </div>
          <p class="field-error" data-for="email"></p>
        </div>

        <div>
          <div class="field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4.5" y="10.5" width="15" height="10" rx="2"/>
              <path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/>
            </svg>
            <input type="password" name="password" placeholder="Password" autocomplete="new-password" required>
            <button type="button" class="field-toggle" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="field-error" data-for="password"></p>
        </div>

        <div>
          <div class="field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4.5" y="10.5" width="15" height="10" rx="2"/>
              <path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/>
            </svg>
            <input type="password" name="confirmPassword" placeholder="Confirm password" autocomplete="new-password" required>
            <button type="button" class="field-toggle" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="field-error" data-for="confirmPassword"></p>
        </div>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <div class="divider">or continue with</div>
      <div class="social-row">
        <button type="button" class="social-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1h-9.17v2.98h5.4c-.23 1.5-1.68 4.4-5.4 4.4-3.25 0-5.9-2.7-5.9-6s2.65-6 5.9-6c1.85 0 3.09.79 3.8 1.47l2.6-2.5C16.9 3.6 14.86 2.7 12.18 2.7 6.98 2.7 2.78 6.9 2.78 12.1s4.2 9.4 9.4 9.4c5.42 0 9.02-3.8 9.02-9.16 0-.62-.07-1.1-.85-2.24Z"/></svg>
          Google
        </button>
        <button type="button" class="social-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.2 2c.15 1.15-.3 2.28-1 3.1-.72.85-1.9 1.5-3.03 1.4-.17-1.1.36-2.28 1.03-3.02C13.94 2.6 15.14 2.03 16.2 2Zm3.6 16.1c-.5 1.14-.74 1.65-1.4 2.65-.9 1.4-2.18 3.15-3.76 3.16-1.4.02-1.76-.9-3.66-.9-1.9 0-2.3.88-3.7.92-1.58.05-2.78-1.5-3.68-2.9-2-3.06-2.24-6.66-.99-8.58.9-1.37 2.3-2.17 3.63-2.17 1.36 0 2.2.9 3.33.9 1.1 0 1.78-.9 3.36-.9 1.15 0 2.38.63 3.28 1.7-2.9 1.6-2.44 5.72.6 6.12Z"/></svg>
          Apple
        </button>
      </div>

      <p class="switch-text">
        Already have an account?
        <a href="login.html" data-nav>Login</a>
      </p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
